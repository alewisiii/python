<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCraftHub - Your Learning Management Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #1f2937;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #8B5CF6, #3B82F6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2rem;
            color: #6b7280;
            font-weight: 500;
        }

        .form-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .form-section h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-section h2::before {
            content: "📚";
            font-size: 1.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #ffffff;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #8B5CF6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
            transform: translateY(-2px);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: #8B5CF6;
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.6);
        }

        .btn-success {
            background: #F59E0B;
            color: white;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.6);
        }

        .btn-danger {
            background: linear-gradient(135deg, #EF4444, #DC2626);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.6);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .courses-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .courses-section h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .courses-section h2::before {
            content: "🎯";
            font-size: 1.5rem;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .course-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .course-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(135deg, #8B5CF6, #3B82F6);
        }

        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .course-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .course-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .course-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-not-started {
            background: #fef3c7;
            color: #92400e;
        }

        .status-in-progress {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-completed {
            background: #d1fae5;
            color: #065f46;
        }

        .course-description {
            color: #6b7280;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .course-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #6b7280;
        }

        .course-actions {
            display: flex;
            gap: 10px;
        }

        .course-actions .btn {
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #8B5CF6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .message-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .message-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .message-success::before {
            content: "✅";
        }

        .message-error::before {
            content: "❌";
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #374151;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: #ffffff;
            margin: 5% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f2937;
        }

        .close {
            color: #6b7280;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close:hover {
            color: #374151;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .courses-grid {
                grid-template-columns: 1fr;
            }

            .course-actions {
                flex-direction: column;
            }

            .modal-content {
                margin: 10% auto;
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>CodeCraftHub</h1>
            <p>Your Learning Management Platform</p>
        </div>

        <!-- Messages -->
        <div id="messages"></div>

        <!-- Add Course Form -->
        <div class="form-section">
            <h2>Add New Course</h2>
            <form id="courseForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="courseName">Course Name *</label>
                        <input type="text" id="courseName" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="targetDate">Target Date *</label>
                        <input type="date" id="targetDate" name="target_date" required>
                    </div>
                    <div class="form-group">
                        <label for="courseStatus">Status *</label>
                        <select id="courseStatus" name="status" required>
                            <option value="">Select Status</option>
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="courseDescription">Description *</label>
                    <textarea id="courseDescription" name="description" required placeholder="Enter course description..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span id="submitText">Add Course</span>
                    <span id="submitSpinner" class="loading-spinner" style="display: none;"></span>
                </button>
            </form>
        </div>

        <!-- Courses List -->
        <div class="courses-section">
            <h2>Your Courses</h2>
            <div id="coursesContainer">
                <div class="loading-spinner" style="margin: 40px auto; display: block;"></div>
            </div>
        </div>
    </div>

    <!-- Edit Course Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Course</h3>
                <span class="close" id="closeModal">&times;</span>
            </div>
            <form id="editForm">
                <input type="hidden" id="editCourseId">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="editCourseName">Course Name *</label>
                        <input type="text" id="editCourseName" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="editTargetDate">Target Date *</label>
                        <input type="date" id="editTargetDate" name="target_date" required>
                    </div>
                    <div class="form-group">
                        <label for="editCourseStatus">Status *</label>
                        <select id="editCourseStatus" name="status" required>
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="editCourseDescription">Description *</label>
                    <textarea id="editCourseDescription" name="description" required></textarea>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="btn" style="background: #6b7280; color: white;" id="cancelEdit">Cancel</button>
                    <button type="submit" class="btn btn-success" id="updateBtn">
                        <span id="updateText">Update Course</span>
                        <span id="updateSpinner" class="loading-spinner" style="display: none;"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        class LearningManagementSystem {
            constructor() {
                this.baseURL = 'http://localhost:5001/api/courses';
                this.courses = [];
                this.editingCourseId = null;
                this.init();
            }

            init() {
                this.bindEvents();
                this.loadCourses();
            }

            bindEvents() {
                // Add course form
                document.getElementById('courseForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.addCourse();
                });

                // Edit course form
                document.getElementById('editForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.updateCourse();
                });

                // Modal events
                document.getElementById('closeModal').addEventListener('click', () => {
                    this.closeModal();
                });

                document.getElementById('cancelEdit').addEventListener('click', () => {
                    this.closeModal();
                });

                // Close modal when clicking outside
                document.getElementById('editModal').addEventListener('click', (e) => {
                    if (e.target.id === 'editModal') {
                        this.closeModal();
                    }
                });
            }

            async loadCourses() {
                try {
                    this.showLoading('coursesContainer');
                    const response = await fetch(this.baseURL);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    console.log(response)
                    this.courses = await response.json();
                    this.renderCourses();
                } catch (error) {
                    console.error('Error loading courses:', error);
                    this.showMessage('Failed to load courses. Please check if the API server is running.', 'error');
                    this.renderEmptyState();
                }
            }

            async addCourse() {
                const form = document.getElementById('courseForm');
                const formData = new FormData(form);
                
                if (!this.validateForm(formData)) {
                    return;
                }

                const courseData = {
                    name: formData.get('name'),
                    description: formData.get('description'),
                    target_date: formData.get('target_date'),
                    status: formData.get('status')
                };

                try {
                    this.setButtonLoading('submitBtn', 'submitText', 'submitSpinner', true);
                    
                    const response = await fetch(this.baseURL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(courseData)
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const newCourse = await response.json();
                    this.courses.push(newCourse);
                    this.renderCourses();
                    form.reset();
                    this.showMessage('Course added successfully!', 'success');
                } catch (error) {
                    console.error('Error adding course:', error);
                    this.showMessage('Failed to add course. Please try again.', 'error');
                } finally {
                    this.setButtonLoading('submitBtn', 'submitText', 'submitSpinner', false);
                }
            }

            async updateCourse() {
                const form = document.getElementById('editForm');
                const formData = new FormData(form);
                const courseId = document.getElementById('editCourseId').value;
                
                if (!this.validateForm(formData)) {
                    return;
                }

                const courseData = {
                    name: formData.get('name'),
                    description: formData.get('description'),
                    target_date: formData.get('target_date'),
                    status: formData.get('status')
                };

                try {
                    this.setButtonLoading('updateBtn', 'updateText', 'updateSpinner', true);
                    
                    const response = await fetch(`${this.baseURL}/${courseId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(courseData)
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const updatedCourse = await response.json();
                    const index = this.courses.findIndex(course => course.id == courseId);
                    if (index !== -1) {
                        this.courses[index] = updatedCourse;
                    }
                    
                    this.renderCourses();
                    this.closeModal();
                    this.showMessage('Course updated successfully!', 'success');
                } catch (error) {
                    console.error('Error updating course:', error);
                    this.showMessage('Failed to update course. Please try again.', 'error');
                } finally {
                    this.setButtonLoading('updateBtn', 'updateText', 'updateSpinner', false);
                }
            }

            async handleDelete(courseId) {
                if (!confirm('Are you sure you want to delete this course? This action cannot be undone.')) {
                    return;
                }

                try {
                    const response = await fetch(`${this.baseURL}/${courseId}`, {
                        method: 'DELETE'
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    this.courses = this.courses.filter(course => course.id != courseId);
                    this.renderCourses();
                    this.showMessage('Course deleted successfully!', 'success');
                } catch (error) {
                    console.error('Error deleting course:', error);
                    this.showMessage('Failed to delete course. Please try again.', 'error');
                }
            }

            editCourse(courseId) {
                const course = this.courses.find(c => c.id == courseId);
                if (!course) return;

                document.getElementById('editCourseId').value = course.id;
                document.getElementById('editCourseName').value = course.name;
                document.getElementById('editCourseDescription').value = course.description;
                document.getElementById('editTargetDate').value = course.target_date;
                document.getElementById('editCourseStatus').value = course.status;

                document.getElementById('editModal').style.display = 'block';
            }

            closeModal() {
                document.getElementById('editModal').style.display = 'none';
                document.getElementById('editForm').reset();
            }

            validateForm(formData) {
                const requiredFields = ['name', 'description', 'target_date', 'status'];
                
                for (const field of requiredFields) {
                    if (!formData.get(field) || formData.get(field).trim() === '') {
                        this.showMessage(`Please fill in the ${field.replace('_', ' ')} field.`, 'error');
                        return false;
                    }
                }

                // Validate date is not in the past
                const targetDate = new Date(formData.get('target_date'));
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                if (targetDate < today) {
                    this.showMessage('Target date cannot be in the past.', 'error');
                    return false;
                }

                return true;
            }

            renderCourses() {
                const container = document.getElementById('coursesContainer');
                
                if (this.courses.length === 0) {
                    this.renderEmptyState();
                    return;
                }

                const coursesHTML = this.courses.map(course => `
                    <div class="course-card">
                        <div class="course-header">
                            <div>
                                <div class="course-title">${this.escapeHtml(course.name)}</div>
                                <span class="course-status status-${course.status.toLowerCase().replace(' ', '-')}">${course.status}</span>
                            </div>
                        </div>
                        <div class="course-description">${this.escapeHtml(course.description)}</div>
                        <div class="course-meta">
                            <span><strong>Target:</strong> ${this.formatDate(course.target_date)}</span>
                            <span><strong>Created:</strong> ${this.formatDate(course.created_at)}</span>
                        </div>
                        <div class="course-actions">
                            <button class="btn btn-success" onclick="lms.editCourse(${course.id})">Edit</button>
                            <button class="btn-danger" onclick="lms.handleDelete(${course.id})">Remove</button>
                        </div>
                    </div>
                `).join('');

                container.innerHTML = `<div class="courses-grid">${coursesHTML}</div>`;
            }

            renderEmptyState() {
                const container = document.getElementById('coursesContainer');
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📚</div>
                        <h3>No courses yet</h3>
                        <p>Start your learning journey by adding your first course above!</p>
                    </div>
                `;
            }

            showLoading(containerId) {
                const container = document.getElementById(containerId);
                container.innerHTML = '<div class="loading-spinner" style="margin: 40px auto; display: block;"></div>';
            }

            setButtonLoading(buttonId, textId, spinnerId, isLoading) {
                const button = document.getElementById(buttonId);
                const text = document.getElementById(textId);
                const spinner = document.getElementById(spinnerId);
                
                button.disabled = isLoading;
                text.style.display = isLoading ? 'none' : 'inline';
                spinner.style.display = isLoading ? 'inline-block' : 'none';
            }

            showMessage(message, type) {
                const messagesContainer = document.getElementById('messages');
                const messageDiv = document.createElement('div');
                messageDiv.className = `message message-${type}`;
                messageDiv.textContent = message;
                
                messagesContainer.appendChild(messageDiv);
                
                // Auto-remove message after 5 seconds
                setTimeout(() => {
                    if (messageDiv.parentNode) {
                        messageDiv.parentNode.removeChild(messageDiv);
                    }
                }, 5000);
            }

            formatDate(dateString) {
                if (!dateString) return 'N/A';
                const date = new Date(dateString);
                return date.toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        // Initialize the Learning Management System
        const lms = new LearningManagementSystem();
    </script>
</body>
</html>
